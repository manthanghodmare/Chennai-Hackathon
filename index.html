<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1E3A8A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Login - NEXUS</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        // Prevent FOUC by applying theme before React mounts
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://unpkg.com/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    <!-- Google Maps Platform SDK -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_MAPS_API_KEY&libraries=geometry"></script>

    <style type="text/tailwindcss">
        @layer theme {
        :root {
            --primary: #1E3A8A;
            --secondary: #3B82F6;
            --accent: #F59E0B;
            --bg-tech: #F9FAFB;
        }
    }
    @layer base {
        body { @apply bg-[#F9FAFB] dark:bg-slate-950 text-[#111827] dark:text-slate-100 font-sans antialiased overflow-x-hidden transition-colors duration-500; }
    }
    </style>
    <!-- Leaflet Map Integration -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Firebase Config -->
    <script src="utils/firebase-config.js?v=111"></script>
    <script src="utils/translations.js?v=111"></script>
    <script type="text/babel" src="utils/context.js?v=111"></script>
    <script src="utils/gemini-api.js?v=111"></script>

    <script type="text/babel" src="utils/auth.js?v=111"></script>
    <script type="text/babel" src="components/Icons.js?v=111"></script>
    <script type="text/babel" src="components/ThemeToggle.js?v=111"></script>
    <script type="text/babel" src="components/Logo.js?v=111"></script>
    <script type="text/babel" src="login-app.js?v=111"></script>
</body>

</html>
