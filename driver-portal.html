<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Portal - NEXUS</title>
    <meta name="description" content="Driver and Mobility Portal for NEXUS fleet management.">
    <meta name="robots" content="noindex, nofollow">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        // Prevent FOUC by applying theme before React mounts
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://unpkg.com/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
        @layer theme {
        :root {
            --primary: #0d9488;
            --primary-dark: #0f766e;
            --secondary: #64748b;
            --bg-light: #f8fafc;
        }
    }
    @layer base {
        body {
            @apply bg-slate-50 text-slate-900 font-sans antialiased;
        }
    }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel" src="utils/mockData.js"></script>
    <script type="text/babel" src="components/Icons.js"></script>
    <script type="text/babel" src="components/ThemeToggle.js"></script>
    <script type="text/babel" src="components/Logo.js"></script>
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="driver-app.js"></script>
</body>

</html>
