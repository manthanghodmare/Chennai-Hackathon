<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1E3A8A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Driver Console - NEXUS</title>
    <meta name="robots" content="noindex">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        // Prevent FOUC by applying theme before React mounts
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://unpkg.com/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
        @layer theme {
            :root {
                --primary: #1E3A8A;
                --secondary: #3B82F6;
                --accent: #F59E0B;
                --bg-tech: #F9FAFB;
            }
        }
        @layer base {
            body { @apply bg-[#F9FAFB] dark:bg-[#020617] text-[#111827] dark:text-slate-100 font-sans antialiased touch-manipulation transition-colors duration-500; }
        }
        @layer utilities {
            .animate-scan {
                animation: scan 4s linear infinite;
            }
            .animate-fade-in {
                animation: fadeIn 0.5s ease-out forwards;
            }
            @keyframes scan {
                0% { transform: translateY(-100%); }
                100% { transform: translateY(1000%); }
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel" src="utils/mockData.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Firebase Config -->
    <script src="utils/firebase-config.js"></script>
    <script src="utils/gemini-api.js"></script>

    <script type="text/babel" src="utils/auth.js"></script>
    <script type="text/babel" src="components/Icons.js"></script>
    <script type="text/babel" src="components/ThemeToggle.js"></script>
    <script type="text/babel" src="components/Logo.js"></script>
    <script type="text/babel" src="components/AuthUI.js"></script>
    <script type="text/babel" src="components/AIChat.js?v=2"></script>
    <script type="text/babel" src="driver-console.js?v=2"></script>
</body>

</html>
